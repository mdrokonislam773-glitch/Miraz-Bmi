<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miraz Digital Hub</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#01875f">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; }
.nav-card.active { background:#01875f; color:white; }
.app-container { display:none; }
.app-container.active { display:block; }
</style>
</head>

<body class="bg-gray-100">

<header class="p-4 bg-white shadow flex justify-between">
<h1 class="font-bold text-lg">MIRAZ PRO</h1>
</header>

<div id="install-banner" style="display:none;" class="p-3">
<button onclick="installPWA()" class="bg-green-600 text-white p-3 rounded">Install App</button>
</div>

<div class="grid grid-cols-3 gap-2 p-3">
<button onclick="showApp('home')" id="btn-home" class="nav-card active p-2 bg-white">Home</button>
<button onclick="showApp('bmi')" id="btn-bmi" class="nav-card p-2 bg-white">BMI</button>
<button onclick="showApp('age')" id="btn-age" class="nav-card p-2 bg-white">Age</button>
</div>

<!-- HOME -->
<div id="app-home" class="app-container active p-5">
<h2>স্বাগতম Miraz App</h2>
</div>

<!-- BMI -->
<div id="app-bmi" class="app-container p-3">
<table border="1" width="100%">
<thead><tr><th>#</th><th>Weight</th><th>Height</th><th>BMI</th></tr></thead>
<tbody id="bmiTableBody"></tbody>
</table>
</div>

<!-- AGE -->
<div id="app-age" class="app-container p-5">
<input type="date" id="dob" class="border p-2">
<button onclick="calcAge()" class="bg-blue-500 text-white p-2">Calculate</button>
<p id="result"></p>
</div>

<!-- DARK BUTTON -->
<button onclick="toggleDark()" style="position:fixed;bottom:20px;right:20px;">🌙</button>

<script>

// Service Worker
if ('serviceWorker' in navigator) {
window.addEventListener('load', () => {
navigator.serviceWorker.register('./sw.js');
});
}

// Install
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
e.preventDefault();
deferredPrompt = e;
document.getElementById('install-banner').style.display='block';
});

function installPWA(){
deferredPrompt.prompt();
}

window.addEventListener('appinstalled', ()=>{
document.getElementById('install-banner').style.display='none';
});

// Navigation
function showApp(app){
document.querySelectorAll('.app-container').forEach(a=>a.classList.remove('active'));
document.getElementById('app-'+app).classList.add('active');
}

// BMI Table
let rows="";
for(let i=1;i<=20;i++){
rows+=`<tr>
<td>${i}</td>
<td><input id="w${i}" oninput="calc(${i})"></td>
<td><input id="h${i}" oninput="calc(${i})"></td>
<td id="r${i}">-</td>
</tr>`;
}
bmiTableBody.innerHTML=rows;

// Save
function save(){
let data=[];
for(let i=1;i<=20;i++){
data.push({
w:document.getElementById('w'+i).value,
h:document.getElementById('h'+i).value
});
}
localStorage.setItem("bmi",JSON.stringify(data));
}

// Load
function load(){
let d=JSON.parse(localStorage.getItem("bmi"));
if(!d)return;
d.forEach((v,i)=>{
let x=i+1;
document.getElementById('w'+x).value=v.w;
document.getElementById('h'+x).value=v.h;
calc(x);
});
}
window.onload=load;

// BMI
function calc(i){
let w=document.getElementById('w'+i).value;
let h=document.getElementById('h'+i).value;
if(w>0&&h>0){
let b=(w/((h/100)*(h/100))).toFixed(2);
document.getElementById('r'+i).innerText=b;
save();
}
}

// Age
function calcAge(){
let d=new Date(document.getElementById('dob').value);
let t=new Date();
let y=t.getFullYear()-d.getFullYear();
document.getElementById('result').innerText=y+" বছর";
}

// Dark
function toggleDark(){
document.body.classList.toggle("bg-black");
document.body.classList.toggle("text-white");
}

</script>

</body>
</html>
