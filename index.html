<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Miraz Digital Hub</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#01875f">
    <link rel="apple-touch-icon" href="https://i.ibb.co/vzN8m6F/miraz-pro-logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .nav-card { transition: all 0.3s ease; }
        .nav-card.active { background: #01875f; color: white; box-shadow: 0 10px 15px -3px rgba(1, 135, 95, 0.3); }
        .app-container { display: none; }
        .app-container.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .premium-table { width: 100%; border-collapse: separate; border-spacing: 0; background: #fff; border-radius: 15px; overflow: hidden; }
        .premium-table th { background: #f1f5f9; padding: 12px 8px; font-size: 11px; font-weight: 800; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        .premium-table td { padding: 10px 5px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        .premium-input { width: 75px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px; text-align: center; font-weight: bold; font-size: 14px; outline: none; }
        .premium-input:focus { border-color: #01875f; background: #fff; }
        
        /* ইউনিক ব্র্যান্ডেড CSS লোগো স্টাইল */
        .brand-logo {
            width: 120px; height: 120px;
            background: linear-gradient(135deg, #059669, #01875f);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(1, 135, 95, 0.2);
            margin: 0 auto;
            position: relative;
        }
        .brand-logo::before {
            content: 'M';
            font-size: 70px; font-weight: 900; color: white;
            font-family: Arial, sans-serif; font-style: italic;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="pb-10">

    <header class="bg-white sticky top-0 z-50 border-b border-gray-200 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-green-600 text-white w-9 h-9 flex items-center justify-center rounded-xl font-bold italic text-xl">M</div>
                <h1 class="text-xl font-black tracking-tighter text-gray-800 italic">MIRAZ<span class="text-green-600">.PRO</span></h1>
            </div>
            <span class="text-[9px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold uppercase">Smart App V3.5</span>
        </div>
    </header>

    <div id="install-banner" class="hidden max-w-5xl mx-auto px-3 mt-4">
        <button onclick="installPWA()" class="w-full bg-[#FFB100] text-gray-900 p-4 rounded-2xl font-bold flex flex-col items-center justify-center shadow-lg animate-bounce border-2 border-white transition transform active:scale-95">
            <div class="flex items-center gap-2 text-lg">
                <i class="fa-solid fa-cloud-arrow-down"></i> ডাউনলোড করুন
            </div>
            <span class="text-[11px] font-medium opacity-90">অ্যাপ ডাউনলোড করলে অফলাইনেও কাজ করবে</span>
        </button>
    </div>

    <div class="max-w-5xl mx-auto px-3 mt-6 grid grid-cols-3 gap-3">
        <button onclick="showApp('home')" id="btn-home" class="nav-card active p-4 rounded-2xl bg-white shadow-sm text-center">
            <i class="fa-solid fa-house-user block text-xl mb-1"></i>
            <span class="text-[11px] font-bold">হোম</span>
        </button>
        <button onclick="showApp('bmi')" id="btn-bmi" class="nav-card p-4 rounded-2xl bg-white shadow-sm text-center text-gray-400">
            <i class="fa-solid fa-list-check block text-xl mb-1"></i>
            <span class="text-[11px] font-bold">BMI Pro</span>
        </button>
        <button onclick="showApp('age')" id="btn-age" class="nav-card p-4 rounded-2xl bg-white shadow-sm text-center text-gray-400">
            <i class="fa-solid fa-calendar-check block text-xl mb-1"></i>
            <span class="text-[11px] font-bold">Age Cal</span>
        </button>
    </div>

    <main class="max-w-5xl mx-auto px-3 mt-6">
        <div id="app-home" class="app-container active">
            <div class="bg-white p-10 rounded-[30px] shadow-xl border border-gray-100 text-center">
                <div class="mb-6">
                    <div class="brand-logo"></div>
                </div>
                <h2 class="text-3xl font-extrabold text-gray-800">স্বাগতম মিরাজ</h2>
                <p class="text-gray-500 mt-3 text-sm leading-relaxed max-w-sm mx-auto">এটি আপনার পার্সোনাল ডিজিটাল হাব। এখন এটি চমৎকার লোগোসহ অফলাইনে কাজ করবে!</p>
            </div>
        </div>

        <div id="app-bmi" class="app-container">
            <div class="bg-white p-4 rounded-[25px] shadow-lg border border-gray-100">
                <h3 class="font-black text-gray-800 text-lg mb-4">BMI Pro List</h3>
                <div class="overflow-x-auto">
                    <table class="premium-table">
                        <thead>
                            <tr><th>#</th><th>নাম</th><th>ওজন (kg)</th><th>উচ্চতা (cm)</th><th>BMI</th></tr>
                        </thead>
                        <tbody id="bmiTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="app-age" class="app-container">
            <div class="bg-white p-8 rounded-[30px] shadow-lg border border-gray-100 text-center">
                <h3 class="text-2xl font-bold text-gray-800 mb-6">বয়স ক্যালকুলেটর</h3>
                <input type="date" id="dob" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-2 border-transparent focus:border-blue-500 outline-none mb-4">
                <button onclick="calcAge()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">ক্যালকুলেট করুন</button>
                <div id="age-result" class="mt-8 hidden p-6 bg-blue-50 rounded-2xl border border-blue-100 font-bold text-blue-700"></div>
            </div>
        </div>
    </main>

    <footer class="mt-12 text-center pb-8">
        <h3 class="text-2xl font-black text-gray-800 italic tracking-tighter">MIRAZ<span class="text-green-600">.DIGITAL</span></h3>
    </footer>

    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }

        // Install logic
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').classList.remove('hidden');
        });

        async function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('install-banner').classList.add('hidden');
                deferredPrompt = null;
            }
        }

        function showApp(appName) {
            document.querySelectorAll('.app-container').forEach(app => app.classList.remove('active'));
            document.querySelectorAll('.nav-card').forEach(btn => btn.classList.remove('active', 'bg-green-600', 'text-white'));
            document.getElementById('app-' + appName).classList.add('active');
            document.getElementById('btn-' + appName).classList.add('active');
        }

        const tableBody = document.getElementById('bmiTableBody');
        for (let i = 1; i <= 30; i++) {
            tableBody.innerHTML += `<tr>
                <td>${i}</td><td>ব্যক্তি ${i}</td>
                <td><input type="number" id="w${i}" class="premium-input" oninput="calculateBMI(${i})" placeholder="0"></td>
                <td><input type="number" id="h${i}" class="premium-input" oninput="calculateBMI(${i})" placeholder="0"></td>
                <td><span id="r${i}" class="font-black">-</span></td>
            </tr>`;
        }

        function calculateBMI(i) {
            const w = document.getElementById('w'+i).value;
            const h = document.getElementById('h'+i).value;
            if (w > 0 && h > 0) {
                document.getElementById('r'+i).innerText = (w / ((h/100)*(h/100))).toFixed(2);
            }
        }

        function calcAge() {
            const dob = new Date(document.getElementById('dob').value);
            const today = new Date();
            let y = today.getFullYear() - dob.getFullYear();
            let m = today.getMonth() - dob.getMonth();
            let d = today.getDate() - dob.getDate();
            if (d < 0) { d += 30; m--; }
            if (m < 0) { m += 12; y--; }
            document.getElementById('age-result').classList.remove('hidden');
            document.getElementById('age-result').innerHTML = `<i class="fa-solid fa-gift mr-2"></i> ${y} বছর, ${m} মাস, ${d} দিন`;
        }
    </script>
</body>
</html>
