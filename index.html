<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Miraz Digital Hub</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#01875f">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/63yG0tM6/miraz-pro-logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f0f4f8; -webkit-tap-highlight-color: transparent; }
        
        /* ন্যাভিগেশন কার্ড */
        .nav-card { transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .nav-card.active { background: #01875f; color: white; border-color: #01875f; box-shadow: 0 10px 15px -3px rgba(1, 135, 95, 0.3); transform: translateY(-2px); }
        
        .app-container { display: none; }
        .app-container.active { display: block; animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* প্রিমিয়াম টেবিল */
        .premium-table th { background: #f8fafc; padding: 12px; font-size: 12px; color: #64748b; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        .premium-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .premium-input { width: 70px; background: #fff; border: 1.5px solid #cbd5e1; border-radius: 10px; padding: 6px; text-align: center; font-weight: bold; outline: none; transition: 0.2s; }
        .premium-input:focus { border-color: #01875f; box-shadow: 0 0 0 3px rgba(1, 135, 95, 0.1); }

        /* আধুনিক ৩ডি 'M' লোগো */
        .modern-logo-box {
            width: 120px; height: 120px;
            background: linear-gradient(145deg, #059669, #01875f);
            border-radius: 30px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 20px 40px rgba(1, 135, 95, 0.25);
            margin: 0 auto;
            position: relative;
            border: 4px solid white;
        }
        .modern-logo-box::after {
            content: 'M';
            font-size: 70px; font-weight: 900; color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.1);
        }

        /* ডাউনলোড বাটন এনিমেশন */
        @keyframes custom-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .animate-download { animation: custom-bounce 2s infinite; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100 shadow-sm">
        <div class="max-w-xl mx-auto px-5 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-green-600 text-white w-10 h-10 flex items-center justify-center rounded-2xl font-bold text-xl shadow-lg shadow-green-200">M</div>
                <h1 class="text-xl font-black text-gray-800 tracking-tight">MIRAZ<span class="text-green-600">.PRO</span></h1>
            </div>
            <div class="px-3 py-1 bg-green-50 border border-green-100 rounded-full">
                <span class="text-[10px] text-green-700 font-black uppercase">v3.5 Premium</span>
            </div>
        </div>
    </header>

    <div id="install-banner" class="hidden max-w-xl mx-auto px-4 mt-6">
        <button onclick="installPWA()" class="w-full bg-[#FFD700] hover:bg-[#FFC400] text-gray-900 p-5 rounded-[24px] font-bold shadow-xl shadow-yellow-100 border-b-4 border-yellow-600 transition-all active:transform active:scale-95 animate-download">
            <div class="flex items-center justify-center gap-3 text-lg">
                <i class="fa-solid fa-circle-arrow-down text-2xl"></i>
                <div>
                    <p class="leading-none">অ্যাপটি ডাউনলোড করুন</p>
                    <p class="text-[10px] font-medium opacity-70 mt-1 uppercase tracking-wider text-left">১০০% অফলাইনে কাজ করবে</p>
                </div>
            </div>
        </button>
    </div>

    <div class="max-w-xl mx-auto px-4 mt-8 grid grid-cols-3 gap-3">
        <button onclick="showApp('home')" id="btn-home" class="nav-card active p-4 rounded-2xl bg-white text-center">
            <i class="fa-solid fa-house-chimney block text-xl mb-1"></i>
            <span class="text-[11px] font-bold">হোম</span>
        </button>
        <button onclick="showApp('bmi')" id="btn-bmi" class="nav-card p-4 rounded-2xl bg-white text-center text-gray-400">
            <i class="fa-solid fa-weight-scale block text-xl mb-1"></i>
            <span class="text-[11px] font-bold">BMI Pro</span>
        </button>
        <button onclick="showApp('age')" id="btn-age" class="nav-card p-4 rounded-2xl bg-white text-center text-gray-400">
            <i class="fa-solid fa-calendar-day block text-xl mb-1"></i>
            <span class="text-[11px] font-bold">Age Cal</span>
        </button>
    </div>

    <main class="max-w-xl mx-auto px-4 mt-8">
        
        <div id="app-home" class="app-container active">
            <div class="bg-white p-12 rounded-[40px] shadow-2xl shadow-gray-200 border border-white text-center">
                <div class="modern-logo-box mb-8"></div>
                <h2 class="text-3xl font-black text-gray-800 tracking-tight">স্বাগতম মিরাজ</h2>
                <p class="text-gray-400 mt-4 text-sm leading-relaxed max-w-[250px] mx-auto font-medium">আপনার পার্সোনাল হেলথ ড্যাশবোর্ড। এখন অফলাইনেও আপনার সাথে।</p>
                
                <div class="mt-12 flex justify-center gap-6">
                    <div class="flex flex-col items-center">
                        <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-lg mb-2"><i class="fa-solid fa-bolt"></i></div>
                        <span class="text-[10px] font-black text-gray-400 uppercase">দ্রুত গতি</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <div class="w-12 h-12 bg-green-50 text-green-600 rounded-2xl flex items-center justify-center text-lg mb-2"><i class="fa-solid fa-shield-halved"></i></div>
                        <span class="text-[10px] font-black text-gray-400 uppercase">নিরাপদ</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="app-bmi" class="app-container">
            <div class="bg-white p-5 rounded-[30px] shadow-xl border border-gray-50">
                <div class="flex items-center gap-3 mb-6 px-2">
                    <div class="w-10 h-10 bg-green-600 text-white rounded-xl flex items-center justify-center shadow-lg shadow-green-100"><i class="fa-solid fa-notes-medical"></i></div>
                    <h3 class="font-black text-gray-800 text-lg uppercase tracking-tight">BMI Records</h3>
                </div>
                <div class="overflow-hidden rounded-2xl border border-gray-100">
                    <table class="w-full premium-table text-center">
                        <thead>
                            <tr><th>#</th><th class="text-left">নাম</th><th>ওজন</th><th>উচ্চতা</th><th>ফল</th></tr>
                        </thead>
                        <tbody id="bmiTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="app-age" class="app-container">
            <div class="bg-white p-10 rounded-[40px] shadow-xl border border-gray-50 text-center">
                <div class="w-20 h-20 bg-blue-600 text-white rounded-3xl mx-auto flex items-center justify-center mb-6 text-3xl shadow-xl shadow-blue-100">
                    <i class="fa-solid fa-hourglass-start"></i>
                </div>
                <h3 class="text-2xl font-black text-gray-800 mb-8 tracking-tight">আপনার সঠিক বয়স</h3>
                
                <div class="text-left mb-6">
                    <label class="text-[11px] font-black text-gray-400 uppercase ml-2 mb-2 block tracking-widest">জন্ম তারিখ নির্বাচন করুন</label>
                    <input type="date" id="dob" class="w-full p-5 bg-gray-50 rounded-2xl font-bold border-2 border-transparent focus:border-blue-500 outline-none transition-all shadow-inner">
                </div>
                
                <button onclick="calcAge()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl font-black shadow-xl shadow-blue-100 transition-all active:scale-95">ক্যালকুলেট করুন</button>
                
                <div id="age-result" class="mt-8 hidden p-6 bg-blue-50 rounded-[25px] border border-blue-100 animate-pulse">
                    <p class="text-blue-700 font-black text-xl" id="finalAgeText"></p>
                </div>
            </div>
        </div>

    </main>

    <footer class="mt-16 text-center pb-10">
        <p class="text-[9px] text-gray-400 uppercase font-black tracking-[0.2em] mb-2">Designed & Developed By</p>
        <h3 class="text-2xl font-black text-gray-800 italic tracking-tighter">MIRAZ<span class="text-green-600">.DIGITAL</span></h3>
    </footer>

    <script>
        // PWA Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
        }

        // Install logic
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').classList.remove('hidden');
        });

        async function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('install-banner').classList.add('hidden');
                deferredPrompt = null;
            }
        }

        function showApp(appName) {
            document.querySelectorAll('.app-container').forEach(app => app.classList.remove('active'));
            document.querySelectorAll('.nav-card').forEach(btn => btn.classList.remove('active'));
            document.getElementById('app-' + appName).classList.add('active');
            document.getElementById('btn-' + appName).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        const tableBody = document.getElementById('bmiTableBody');
        for (let i = 1; i <= 30; i++) {
            tableBody.innerHTML += `
                <tr>
                    <td class="text-[10px] font-bold text-gray-300">${i}</td>
                    <td class="text-left text-xs font-black text-gray-700">USER ${i}</td>
                    <td><input type="number" id="w${i}" class="premium-input" oninput="calculateBMI(${i})" placeholder="0"></td>
                    <td><input type="number" id="h${i}" class="premium-input" oninput="calculateBMI(${i})" placeholder="0"></td>
                    <td class="font-black text-sm text-green-600"><span id="r${i}">-</span></td>
                </tr>`;
        }

        function calculateBMI(i) {
            const w = document.getElementById('w'+i).value;
            const h = document.getElementById('h'+i).value;
            if (w > 0 && h > 0) {
                const bmi = (w / ((h/100)*(h/100))).toFixed(1);
                document.getElementById('r'+i).innerText = bmi;
            } else { document.getElementById('r'+i).innerText = "-"; }
        }

        function calcAge() {
            const dobVal = document.getElementById('dob').value;
            if(!dobVal) return;
            const dob = new Date(dobVal);
            const today = new Date();
            let y = today.getFullYear() - dob.getFullYear();
            let m = today.getMonth() - dob.getMonth();
            let d = today.getDate() - dob.getDate();
            if (d < 0) { d += 30; m--; }
            if (m < 0) { m += 12; y--; }
            document.getElementById('age-result').classList.remove('hidden');
            document.getElementById('finalAgeText').innerHTML = `<i class="fa-solid fa-cake-candles mr-2"></i> ${y}Y ${m}M ${d}D`;
        }
    </script>
</body>
</html>
