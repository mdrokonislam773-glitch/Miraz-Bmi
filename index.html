<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Miraz Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#01875f">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f0f2f5; }
        .nav-card.active { background: #01875f; color: white; transform: translateY(-5px); }
        .app-container { display: none; }
        .app-container.active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .m-logo { width: 60px; height: 60px; background: #01875f; color: white; display: flex; align-items: center; justify-content: center; font-size: 35px; font-weight: 900; border-radius: 18px; margin: 0 auto 15px; border: 4px solid white; box-shadow: 0 10px 20px rgba(1,135,95,0.2); font-style: italic; }
        .status-badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; color: white; display: none; margin-top: 5px; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-white sticky top-0 z-50 border-b p-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="bg-green-600 text-white w-8 h-8 flex items-center justify-center rounded-lg font-black italic">M</div>
            <h1 class="text-lg font-black italic">MIRAZ<span class="text-green-600">.PRO</span></h1>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-[10px] bg-green-100 text-green-700 px-2 py-1 rounded-full font-bold">SMART V3.5</span>
            <i class="fa-solid fa-wifi text-green-500 text-xs"></i>
        </div>
    </header>

    <div id="install-banner" class="hidden px-4 mt-4">
        <button onclick="installPWA()" class="w-full bg-yellow-400 p-4 rounded-2xl font-bold shadow-lg flex justify-between items-center border-2 border-white">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-cloud-arrow-down text-xl"></i>
                <div class="text-left">
                    <p class="text-sm">অ্যাপ ডাউনলোড করুন</p>
                    <p class="text-[9px] opacity-70">অফলাইনেও কাজ করবে</p>
                </div>
            </div>
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </div>

    <div class="px-4 mt-6 grid grid-cols-3 gap-3">
        <button onclick="showApp('home')" id="btn-home" class="nav-card active p-4 rounded-2xl bg-white shadow-sm transition-all text-center">
            <i class="fa-solid fa-house-chimney block mb-1 text-lg"></i>
            <span class="text-xs font-bold">হোম</span>
        </button>
        <button onclick="showApp('bmi')" id="btn-bmi" class="nav-card p-4 rounded-2xl bg-white shadow-sm transition-all text-center">
            <i class="fa-solid fa-notes-medical block mb-1 text-lg"></i>
            <span class="text-xs font-bold">BMI Pro</span>
        </button>
        <button onclick="showApp('age')" id="btn-age" class="nav-card p-4 rounded-2xl bg-white shadow-sm transition-all text-center">
            <i class="fa-solid fa-calendar-check block mb-1 text-lg"></i>
            <span class="text-xs font-bold">Age Cal</span>
        </button>
    </div>

    <main class="px-4 mt-6">
        <div id="app-home" class="app-container active">
            <div class="bg-white p-10 rounded-[35px] shadow-xl text-center">
                <div class="m-logo">M</div>
                <h2 class="text-2xl font-bold text-gray-800">স্বাগতম, আমি মিরাজ</h2>
                <p class="text-gray-500 mt-3 text-sm leading-relaxed">এটি আপনার পার্সোনাল ডিজিটাল হাব। এখন এটি লোগোসহ অফলাইনে কাজ করবে!</p>
                <div class="mt-8 pt-6 border-t border-gray-100 italic font-black text-gray-300 text-xs">MIRAZ.DIGITAL</div>
            </div>
        </div>

        <div id="app-bmi" class="app-container">
            <div class="bg-white p-4 rounded-3xl shadow-lg">
                <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-heart-pulse text-green-500"></i> Health Record List
                </h3>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="text-[10px] text-gray-400 border-b">
                                <th class="pb-3 text-center">ওজন (KG)</th>
                                <th class="pb-3 text-center">উচ্চতা (CM)</th>
                                <th class="pb-3 text-center">ফলাফল ও অবস্থা</th>
                            </tr>
                        </thead>
                        <tbody id="bmiTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="app-age" class="app-container">
            <div class="bg-white p-6 rounded-[35px] shadow-xl text-center">
                <h3 class="text-xl font-black text-gray-800 mb-6">বয়স ক্যালকুলেটর</h3>
                
                <div class="grid grid-cols-3 gap-3 mb-6">
                    <div>
                        <span class="text-[10px] font-bold text-gray-400 block mb-1">দিন</span>
                        <input type="number" id="day" placeholder="DD" class="w-full p-4 bg-gray-50 rounded-2xl text-center font-bold outline-none border-2 border-transparent focus:border-green-500">
                    </div>
                    <div>
                        <span class="text-[10px] font-bold text-gray-400 block mb-1">মাস</span>
                        <input type="number" id="month" placeholder="MM" class="w-full p-4 bg-gray-50 rounded-2xl text-center font-bold outline-none border-2 border-transparent focus:border-green-500">
                    </div>
                    <div>
                        <span class="text-[10px] font-bold text-gray-400 block mb-1">বছর</span>
                        <input type="number" id="year" placeholder="YYYY" class="w-full p-4 bg-gray-50 rounded-2xl text-center font-bold outline-none border-2 border-transparent focus:border-green-500">
                    </div>
                </div>

                <button onclick="calculateAge()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-green-100 active:scale-95 transition-all">CALCULATE</button>

                <div id="age-result-box" class="mt-8 hidden">
                    <div class="bg-green-50 p-6 rounded-3xl border border-green-100">
                        <p class="text-green-800 font-bold mb-4" id="age-summary"></p>
                        <div class="grid grid-cols-3 gap-2">
                            <div class="bg-white p-3 rounded-2xl shadow-sm">
                                <p class="text-[9px] text-gray-400 font-bold uppercase">বছর</p>
                                <p id="res-y" class="text-xl font-black text-green-600">0</p>
                            </div>
                            <div class="bg-white p-3 rounded-2xl shadow-sm">
                                <p class="text-[9px] text-gray-400 font-bold uppercase">মাস</p>
                                <p id="res-m" class="text-xl font-black text-green-600">0</p>
                            </div>
                            <div class="bg-white p-3 rounded-2xl shadow-sm">
                                <p class="text-[9px] text-gray-400 font-bold uppercase">দিন</p>
                                <p id="res-d" class="text-xl font-black text-green-600">0</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Tab switching logic
        function showApp(name) {
            document.querySelectorAll('.app-container').forEach(a => a.classList.remove('active'));
            document.querySelectorAll('.nav-card').forEach(b => b.classList.remove('active'));
            document.getElementById('app-' + name).classList.add('active');
            document.getElementById('btn-' + name).classList.add('active');
        }

        // BMI logic with status
        const table = document.getElementById('bmiTableBody');
        for (let i = 1; i <= 15; i++) {
            table.innerHTML += `
                <tr class="border-b last:border-0">
                    <td class="py-4"><input type="number" id="w${i}" oninput="calcBMI(${i})" class="w-14 bg-gray-50 p-2 rounded-lg text-center font-bold outline-none" placeholder="0"></td>
                    <td class="py-4"><input type="number" id="h${i}" oninput="calcBMI(${i})" class="w-14 bg-gray-50 p-2 rounded-lg text-center font-bold outline-none" placeholder="0"></td>
                    <td class="py-4 text-center">
                        <span id="r${i}" class="font-black text-gray-800">-</span>
                        <div id="s${i}" class="status-badge"></div>
                    </td>
                </tr>`;
        }

        function calcBMI(i) {
            const w = document.getElementById('w'+i).value;
            const h = document.getElementById('h'+i).value;
            const res = document.getElementById('r'+i);
            const status = document.getElementById('s'+i);
            
            if (w > 0 && h > 0) {
                const bmi = (w / ((h/100)*(h/100))).toFixed(1);
                res.innerText = bmi;
                status.style.display = "inline-block";
                
                if (bmi < 18.5) { status.innerText = "কম ওজন"; status.style.background = "#f59e0b"; }
                else if (bmi <= 24.9) { status.innerText = "স্বাভাবিক"; status.style.background = "#10b981"; }
                else if (bmi <= 29.9) { status.innerText = "বেশি ওজন"; status.style.background = "#ef4444"; }
                else { status.innerText = "মৃত্যু ঝুঁকি"; status.style.background = "#7f1d1d"; }
            } else {
                res.innerText = "-"; status.style.display = "none";
            }
        }

        // Professional Age Calc logic
        function calculateAge() {
            const d1 = parseInt(document.getElementById('day').value);
            const m1 = parseInt(document.getElementById('month').value);
            const y1 = parseInt(document.getElementById('year').value);
            if(!d1 || !m1 || !y1) return alert("সঠিকভাবে পূরণ করুন");

            const today = new Date();
            let d2 = today.getDate(), m2 = today.getMonth() + 1, y2 = today.getFullYear();
            let monthDays = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];

            if (d1 > d2) { d2 += monthDays[m2 - 1]; m2--; }
            if (m1 > m2) { m2 += 12; y2--; }

            const d = d2 - d1, m = m2 - m1, y = y2 - y1;
            document.getElementById('age-result-box').classList.remove('hidden');
            document.getElementById('res-y').innerText = y;
            document.getElementById('res-m').innerText = m;
            document.getElementById('res-d').innerText = d;
            document.getElementById('age-summary').innerText = `আপনার বয়স এখন ${y} বছর ${m} মাস ${d} দিন`;
        }

        // PWA Offline logic
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('install-banner').classList.remove('hidden');
        });

        async function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('install-banner').classList.add('hidden');
                deferredPrompt = null;
            }
        }
    </script>
</body>
</html>
