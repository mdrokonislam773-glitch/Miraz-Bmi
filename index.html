<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Miraz Pro BD</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#01875f">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f0f2f5; -webkit-tap-highlight-color: transparent; }
        .nav-card.active { background: #01875f; color: white; transform: scale(1.05); box-shadow: 0 10px 20px rgba(1,135,95,0.2); }
        .app-container { display: none; }
        .app-container.active { display: block; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* ইউনিক এম (M) লোগো */
        .m-logo-circle {
            width: 80px; height: 80px; background: #01875f; color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 45px; font-weight: 900; border-radius: 24px;
            margin: 0 auto 20px; border: 5px solid white; font-style: italic;
            box-shadow: 0 15px 30px rgba(1,135,95,0.2);
        }
        .status-badge { padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; color: white; display: none; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-white sticky top-0 z-50 border-b p-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="bg-green-600 text-white w-8 h-8 flex items-center justify-center rounded-lg font-black italic">M</div>
            <h1 class="text-lg font-black italic">MIRAZ<span class="text-green-600">.PRO</span></h1>
        </div>
        <span class="text-[10px] bg-green-100 text-green-700 px-2 py-1 rounded-full font-bold">V3.5 PRO</span>
    </header>

    <div id="install-banner" class="hidden px-4 mt-4">
        <button onclick="installPWA()" class="w-full bg-[#FFD700] text-gray-900 p-4 rounded-2xl font-black shadow-lg flex justify-between items-center border-2 border-white active:scale-95 transition-all">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-download text-xl animate-bounce"></i>
                <div class="text-left leading-tight">
                    <p class="text-sm">অ্যাপটি ডাউনলোড করুন</p>
                    <p class="text-[10px] opacity-75">ইন্টারনেট ছাড়াও কাজ করবে</p>
                </div>
            </div>
            <i class="fa-solid fa-circle-arrow-right text-xl"></i>
        </button>
    </div>

    <div class="px-4 mt-6 grid grid-cols-3 gap-3">
        <button onclick="showApp('home')" id="btn-home" class="nav-card active p-4 rounded-2xl bg-white shadow-sm text-center transition-all">
            <i class="fa-solid fa-home block mb-1"></i><span class="text-xs font-bold">হোম</span>
        </button>
        <button onclick="showApp('bmi')" id="btn-bmi" class="nav-card p-4 rounded-2xl bg-white shadow-sm text-center transition-all">
            <i class="fa-solid fa-weight block mb-1"></i><span class="text-xs font-bold">BMI Pro</span>
        </button>
        <button onclick="showApp('age')" id="btn-age" class="nav-card p-4 rounded-2xl bg-white shadow-sm text-center transition-all">
            <i class="fa-solid fa-calendar-alt block mb-1"></i><span class="text-xs font-bold">Age Cal</span>
        </button>
    </div>

    <main class="px-4 mt-6">
        <div id="app-home" class="app-container active">
            <div class="bg-white p-12 rounded-[40px] shadow-xl text-center border-b-8 border-green-600">
                <div class="m-logo-circle shadow-green-200">M</div>
                <h2 class="text-2xl font-black text-gray-800">MIRAZ DIGITAL</h2>
                <p class="text-gray-400 mt-2 text-sm">আপনার পার্সোনাল ডিজিটাল প্রো সহকারী।</p>
                <div class="mt-8 flex justify-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span class="text-[10px] font-bold text-green-600 uppercase tracking-widest">Offline Ready</span>
                </div>
            </div>
        </div>

        <div id="app-bmi" class="app-container">
            <div class="bg-white p-5 rounded-3xl shadow-lg">
                <h3 class="font-bold text-gray-800 mb-4 border-b pb-2 italic">Health Status List</h3>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="text-[10px] text-gray-400 text-center">
                                <th class="pb-2">ওজন (KG)</th><th class="pb-2">উচ্চতা (CM)</th><th class="pb-2">BMI ও অবস্থা</th>
                            </tr>
                        </thead>
                        <tbody id="bmiTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="app-age" class="app-container">
            <div class="bg-white p-8 rounded-[40px] shadow-xl text-center">
                <h3 class="text-xl font-black text-gray-800 mb-6">Age Calculator</h3>
                <div class="grid grid-cols-3 gap-3 mb-6">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 block mb-1 uppercase">Day</label>
                        <input type="number" id="d" placeholder="DD" class="w-full p-4 bg-gray-100 rounded-2xl text-center font-bold outline-none focus:bg-white focus:ring-2 ring-green-500 transition-all">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 block mb-1 uppercase">Month</label>
                        <input type="number" id="m" placeholder="MM" class="w-full p-4 bg-gray-100 rounded-2xl text-center font-bold outline-none focus:bg-white focus:ring-2 ring-green-500 transition-all">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 block mb-1 uppercase">Year</label>
                        <input type="number" id="y" placeholder="YYYY" class="w-full p-4 bg-gray-100 rounded-2xl text-center font-bold outline-none focus:bg-white focus:ring-2 ring-green-500 transition-all">
                    </div>
                </div>
                <button onclick="getAge()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-green-100 active:scale-95 transition-all">CALCULATE</button>
                <div id="age-box" class="mt-8 hidden p-6 bg-green-50 rounded-3xl border border-green-100 animate-fadeIn">
                    <p id="age-text" class="text-green-800 font-bold mb-4"></p>
                    <div class="grid grid-cols-3 gap-2 text-center">
                        <div class="bg-white p-3 rounded-2xl shadow-sm"><p class="text-[9px] text-gray-400 font-bold">YEAR</p><p id="ry" class="text-xl font-black text-green-600">0</p></div>
                        <div class="bg-white p-3 rounded-2xl shadow-sm"><p class="text-[9px] text-gray-400 font-bold">MONTH</p><p id="rm" class="text-xl font-black text-green-600">0</p></div>
                        <div class="bg-white p-3 rounded-2xl shadow-sm"><p class="text-[9px] text-gray-400 font-bold">DAY</p><p id="rd" class="text-xl font-black text-green-600">0</p></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // UI Navigation
        function showApp(id) {
            document.querySelectorAll('.app-container').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.nav-card').forEach(e => e.classList.remove('active'));
            document.getElementById('app-'+id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('active');
        }

        // BMI logic with status
        const tbody = document.getElementById('bmiTableBody');
        for (let i = 1; i <= 15; i++) {
            tbody.innerHTML += `
                <tr class="border-b">
                    <td class="py-4"><input type="number" id="w${i}" oninput="calcBMI(${i})" class="w-16 bg-gray-50 p-2 rounded-lg text-center font-bold" placeholder="0"></td>
                    <td class="py-4"><input type="number" id="h${i}" oninput="calcBMI(${i})" class="w-16 bg-gray-50 p-2 rounded-lg text-center font-bold" placeholder="0"></td>
                    <td class="py-4 text-center"><span id="res${i}" class="font-black text-xs">-</span><br><span id="st${i}" class="status-badge"></span></td>
                </tr>`;
        }

        function calcBMI(i) {
            const w = document.getElementById('w'+i).value, h = document.getElementById('h'+i).value;
            const res = document.getElementById('res'+i), st = document.getElementById('st'+i);
            if (w > 0 && h > 0) {
                const bmi = (w / ((h/100)*(h/100))).toFixed(1);
                res.innerText = bmi; st.style.display = "inline-block";
                if (bmi < 18.5) { st.innerText="কম ওজন"; st.style.background="#f59e0b"; }
                else if (bmi <= 24.9) { st.innerText="স্বাভাবিক"; st.style.background="#10b981"; }
                else if (bmi <= 29.9) { st.innerText="বেশি ওজন"; st.style.background="#ef4444"; }
                else { st.innerText="মৃত্যু ঝুঁকি"; st.style.background="#7f1d1d"; }
            } else { res.innerText="-"; st.style.display="none"; }
        }

        // Age Calculator logic
        function getAge() {
            const d1 = parseInt(document.getElementById('d').value), m1 = parseInt(document.getElementById('m').value), y1 = parseInt(document.getElementById('y').value);
            if(!d1 || !m1 || !y1) return alert("সঠিক দিন, মাস ও বছর লিখুন");
            const today = new Date();
            let d2 = today.getDate(), m2 = today.getMonth() + 1, y2 = today.getFullYear();
            let month = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
            if (d1 > d2) { d2 += month[m2 - 1]; m2--; }
            if (m1 > m2) { m2 += 12; y2--; }
            const d = d2-d1, m = m2-m1, y = y2-y1;
            document.getElementById('age-box').classList.remove('hidden');
            document.getElementById('ry').innerText = y; document.getElementById('rm').innerText = m; document.getElementById('rd').innerText = d;
            document.getElementById('age-text').innerText = "আপনার বয়স: " + y + " বছর " + m + " মাস " + d + " দিন";
        }

        // Offline Service Worker
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        let dP;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); dP = e;
            document.getElementById('install-banner').classList.remove('hidden');
        });

        async function installPWA() {
            if (dP) {
                dP.prompt();
                const { outcome } = await dP.userChoice;
                if (outcome === 'accepted') document.getElementById('install-banner').classList.add('hidden');
                dP = null;
            }
        }
    </script>
</body>
</html>
